services:
  timescaledb:
    image: timescale/timescaledb:latest-pg17
    container_name: timescaledb
    environment:
      - POSTGRES_PASSWORD=toor
      - POSTGRES_USER=root
      - POSTGRES_DB=homey
    ports:
      - "5432:5432"
    volumes:
      - ./volumes/timescaledb:/var/lib/postgresql/data
